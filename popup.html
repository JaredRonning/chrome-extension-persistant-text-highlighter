<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=380" />
<style>
  /* ── Reset & Base ── */
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --surface2: #0f3460;
    --accent: #e94560;
    --accent-soft: rgba(233, 69, 96, 0.15);
    --text: #eaeaea;
    --text-dim: #8892a4;
    --border: rgba(255,255,255,0.07);
    --radius: 10px;
  }

  body {
    width: 380px;
    min-height: 200px;
    max-height: 560px;
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow-y: auto;
  }

  /* ── Header ── */
  .header {
    padding: 16px 18px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid var(--border);
  }
  .header svg { flex-shrink: 0; }
  .header h1 {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }
  .header .url {
    display: block;
    font-size: 11px;
    color: var(--text-dim);
    max-width: 310px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    margin-top: 2px;
  }

  /* ── Default Color Row ── */
  .default-color-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 18px;
    border-bottom: 1px solid var(--border);
  }
  .default-color-row .label {
    font-size: 12px;
    color: var(--text-dim);
    white-space: nowrap;
  }
  .palette {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
  }
  .palette .swatch {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 2px solid transparent;
    cursor: pointer;
    transition: border-color 0.15s, transform 0.15s;
    position: relative;
  }
  .palette .swatch:hover { transform: scale(1.15); }
  .palette .swatch.selected {
    border-color: #fff;
    box-shadow: 0 0 0 1px rgba(0,0,0,0.3);
  }
  .palette .swatch.selected::after {
    content: "";
    position: absolute;
    top: 50%; left: 50%;
    width: 6px; height: 6px;
    background: rgba(0,0,0,0.45);
    border-radius: 50%;
    transform: translate(-50%, -50%);
  }

  /* ── Input Row ── */
  .input-row {
    display: flex;
    gap: 8px;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
  }
  .input-row input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 9px 12px;
    color: var(--text);
    font-size: 13px;
    outline: none;
    transition: border 0.2s;
  }
  .input-row input::placeholder { color: var(--text-dim); }
  .input-row input:focus { border-color: var(--accent); }

  .btn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    padding: 9px 16px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
    white-space: nowrap;
  }
  .btn:hover { opacity: 0.85; }
  .btn:active { transform: scale(0.97); }

  /* ── Snippet List ── */
  .list { padding: 6px 18px 14px; }

  .empty {
    text-align: center;
    padding: 30px 10px;
    color: var(--text-dim);
    font-size: 13px;
    line-height: 1.6;
  }
  .empty svg { margin-bottom: 8px; opacity: 0.35; }

  .snippet {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    animation: fadeIn 0.2s ease;
  }
  .snippet:last-child { border-bottom: none; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Color dot in snippet row — clickable to open mini picker */
  .dot-wrapper {
    position: relative;
    flex-shrink: 0;
  }
  .color-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    margin-top: 2px;
    cursor: pointer;
    border: 2px solid rgba(255,255,255,0.15);
    transition: transform 0.15s, border-color 0.15s;
  }
  .color-dot:hover {
    transform: scale(1.2);
    border-color: rgba(255,255,255,0.5);
  }

  .snippet-text {
    flex: 1;
    font-size: 13px;
    line-height: 1.45;
    word-break: break-word;
  }

  .snippet-time {
    display: block;
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .snippet .remove {
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    padding: 2px 4px;
    font-size: 16px;
    line-height: 1;
    border-radius: 4px;
    transition: color 0.15s, background 0.15s;
    flex-shrink: 0;
  }
  .snippet .remove:hover {
    color: var(--accent);
    background: var(--accent-soft);
  }

  /* ── Inline color picker popover ── */
  .color-picker-popover {
    position: absolute;
    top: 22px;
    left: -4px;
    background: var(--surface);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    padding: 6px;
    display: flex;
    gap: 4px;
    z-index: 1000;
    box-shadow: 0 4px 16px rgba(0,0,0,0.5);
  }
  .color-picker-popover .swatch {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 2px solid transparent;
    cursor: pointer;
    transition: transform 0.1s;
  }
  .color-picker-popover .swatch:hover { transform: scale(1.2); }
  .color-picker-popover .swatch.active { border-color: #fff; }

  /* ── Footer ── */
  .footer {
    padding: 10px 18px 14px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .footer .count {
    font-size: 11px;
    color: var(--text-dim);
  }
  .footer .clear-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    border-radius: 6px;
    padding: 5px 10px;
    font-size: 11px;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
  }
  .footer .clear-btn:hover {
    color: var(--accent);
    border-color: var(--accent);
  }
</style>
</head>
<body>

<div class="header">
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#e94560" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 2L2 7l10 5 10-5-10-5z"/>
    <path d="M2 17l10 5 10-5"/>
    <path d="M2 12l10 5 10-5"/>
  </svg>
  <div>
    <h1>Page Highlighter</h1>
    <span class="url" id="pageUrl">—</span>
  </div>
</div>

<div class="default-color-row">
  <span class="label">Default color:</span>
  <div class="palette" id="defaultPalette"></div>
</div>

<div class="input-row">
  <input type="text" id="snippetInput" placeholder="Enter text to highlight…" />
  <button class="btn" id="addBtn">Add</button>
</div>

<div class="list" id="list"></div>

<div class="footer" id="footer" style="display:none">
  <span class="count" id="count"></span>
  <button class="clear-btn" id="clearBtn">Clear all</button>
</div>

<script src="popup.js"></script>
</body>
</html>
